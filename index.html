<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">
            <span class="tic">TIC</span>
            <span class="tac">TAC</span>
            <span class="toe">TOE</span>
        </h1>

        <div class="players-info">
            <div class="player player-x">
                <div class="symbol x-symbol">X</div>
                <div class="player-name">PLAYER X</div>
                <div class="score" id="scoreX">0</div>
            </div>

            <div class="vs">VS</div>

            <div class="player player-o">
                <div class="symbol o-symbol">O</div>
                <div class="player-name">PLAYER O</div>
                <div class="score" id="scoreO">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="game-status" id="gameStatus">
            <div class="status-icon">◐</div>
            <div class="status-text">
                <div class="status-title">GAME IN PROGRESS</div>
                <div class="status-message" id="statusMessage">PLAYER X'S TURN</div>
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">
            <span class="reset-icon">↻</span> RESET GAME
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
